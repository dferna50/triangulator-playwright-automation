query FindSuggestions($filters: SuggestionFilterInput!, $sort: [SuggestionSortItem]!, $offset: Int!, $limit: Int!) {
  suggestions(filters: $filters, sort: $sort, offset: $offset, limit: $limit) {
    totalCount
    suggestionRequest {
      requestType
      requestId
      requestName
      existingRule
      __typename
    }
    courseMetadata {
      courseId
      providedCourseIdentifier
      masterCourseId
      courseSubject
      courseNumber
      courseLongTitle
      courseLongDeptName
      courseDescription
      courseCreditMinValue
      courseCreditMaxValue
      instUniqueId
      courseCreditUnits
      genEdCategoryCode
      activeCourseIndicator
      courseEffectiveYearMonth
      courseExpirationYearMonth
      coursePrerequisiteId
      courseCorequisiteId
      courseLevel
      courseLevelCategory
      dataSource
      __typename
    }
    courseMetadataAll {
      courseId
      providedCourseIdentifier
      masterCourseId
      courseSubject
      courseNumber
      courseLongTitle
      courseLongDeptName
      courseDescription
      courseCreditMinValue
      courseCreditMaxValue
      instUniqueId
      courseCreditUnits
      genEdCategoryCode
      activeCourseIndicator
      courseEffectiveYearMonth
      courseExpirationYearMonth
      coursePrerequisiteId
      courseCorequisiteId
      courseLevel
      courseLevelCategory
      dataSource
      __typename
    }
    courses {
      courseId
      courseSubject
      courseNumber
      courseLevel
      institutionId
      courseCredits
      courseLevel
      genedCategoryName
      courseTitle
      courseElectiveIndicator
      __typename
    }
    institutions {
      institutionId
      name
      city
      state
      ipedsInfo
      avatarUrl
      webAddress
      status
      __typename
    }
    users {
      uuid
      email
      firstName
      lastName
      role
      status
      profileAvatar
      lastLogin
      institutionId
      __typename
    }
    suggestions {
      uuid
      sourceCourseId
      targetCourseId
      creditHours
      assigneeId
      decision
      decisionMakerId
      dateLastModified
      dateCreated
      dateDecided
      score
      effectiveEndYearMonth
      effectiveBeginYearMonth
      sourceSuggestionRequestId
      sourceSuggestion
      sourceCourseGroup
      targetCourseGroup
      recordType
      alignmentPeerCourseIds
      alignmentType
      sourceInstitutionId
      targetInstitutionId
      boostType
      workflowId
      status
      __typename
    }
    suggestionDecisions {
      decisionId
      suggestionId
      decision
      decidedByUserId
      rejectionReasons
      __typename
    }
    __typename
  }
}